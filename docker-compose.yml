version: '3.8'

# 独立扫描器模式 - 使用外部MySQL和MinIO
# 适用于已有MySQL和MinIO服务的场景

services:
  # 图片扫描应用服务
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ims-scanner
    restart: "no"
    environment:
      # MinIO配置（外部服务）
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-images}
      
      # 腾讯云IMS配置
      TENCENT_SECRET_ID: ${TENCENT_SECRET_ID}
      TENCENT_SECRET_KEY: ${TENCENT_SECRET_KEY}
      TENCENT_REGION: ${TENCENT_REGION:-ap-guangzhou}
      
      # MySQL配置（外部服务）
      MYSQL_HOST: ${MYSQL_HOST:-localhost}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-image_security}
      
      # 扫描配置
      HASH_SIZE: ${HASH_SIZE:-8}
      SCAN_PREFIX: ${SCAN_PREFIX:-}
      FORCE_RESCAN: ${FORCE_RESCAN:-false}
      SCAN_LIMIT: ${SCAN_LIMIT:-}
      
      # 时区
      TZ: Asia/Shanghai
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./.env:/app/.env:ro
    network_mode: ${DOCKER_NETWORK_MODE:-host}
    # 如果使用bridge网络，取消下面注释并配置networks
    # networks:
    #   - ims-network
    command: >
      sh -c "
        echo '========================================' &&
        echo '  图片内容安全扫描系统' &&
        echo '========================================' &&
        echo '' &&
        echo '连接配置:' &&
        echo '  MinIO: $${MINIO_ENDPOINT}' &&
        echo '  MySQL: $${MYSQL_HOST}:$${MYSQL_PORT}' &&
        echo '' &&
        echo '开始扫描...' &&
        python scanner.py &&
        echo '' &&
        echo '扫描完成！' &&
        echo '违规报告: /app/data/violations.txt'
      "

# 如果使用bridge网络，取消下面注释
# networks:
#   ims-network:
#     driver: bridge
